embedding:
  service_url: "https://brain.idgcapital.com/embed"
  batch_size: 16
  dimension: 768

rerank:
  service_url: "https://brain.idgcapital.com/rerank"
  batch_size: 16

chunking:
  chunk_size: 600
  overlap_size: 100

store:
  persist_dir: "~/.claude/skills/rag/.data/chroma"
  default_collection: "rag_default"

llm:
  provider: "openai_compatible"
  base_url: "http://llm.idgcapital.com:8080/v1"
  model: "default"
  temperature: 0.1
  max_tokens: 2048

ingestion:
  code_extensions: [".py", ".js", ".ts", ".tsx", ".jsx", ".go", ".rs", ".java", ".cpp", ".c", ".h", ".cs", ".rb", ".php", ".swift", ".kt"]
  ignore_patterns: ["node_modules", ".git", "__pycache__", ".venv", "dist", "build", ".next"]
  max_file_size_mb: 10

retrieval:
  top_k: 10
  rerank_top_k: 5
